name: Package Extension on Release

on:
  release:
    types: [created]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: |
          # Copy the ai-boundaries folder and rename to ai-boundaries-release
          cp -r ai-boundaries ai-boundaries-release
          # Remove git/workflows from the copy
          rm -rf ai-boundaries-release/.git ai-boundaries-release/.github
          # Zip it
          zip -r ai-boundaries.zip ai-boundaries-release/
          ls -lh ai-boundaries.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: ai-boundaries.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
