name: Package Extension on Release

on:
  release:
    types: [created]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: |
          # Create a temp dir with just the extension files
          mkdir -p release-staging
          cp manifest.json onboarding.html onboarding.js sidepanel.html sidepanel.js storage.js background.js README.md release-staging/
          mkdir -p release-staging/.github/workflows
          cp .github/workflows/release.yml release-staging/.github/workflows/

          # Zip it
          cd release-staging
          zip -r ../ai-boundaries.zip .
          cd ..
          ls -lh ai-boundaries.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: ai-boundaries.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
