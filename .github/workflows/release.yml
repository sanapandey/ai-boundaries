name: Package Extension on Release

on:
  release:
    types: [created]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: |
          # The repo root IS ai-boundaries, so list files to verify
          echo "Files in current directory:"
          ls -la

          # Zip everything except .git and .github
          zip -r ai-boundaries.zip . -x ".git/*" ".github/*" "*.zip"

          # Verify contents
          echo "ZIP contents:"
          unzip -l ai-boundaries.zip | head -20

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: ai-boundaries.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
